version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: fn_postgres_db
    restart: always
    environment:
      POSTGRES_USER: fn_admin
      POSTGRES_PASSWORD: fn_secure_password_123
      POSTGRES_DB: fn_isp_billing
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fn_admin -d fn_isp_billing"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fn_fastapi_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://fn_admin:fn_secure_password_123@db:5432/fn_isp_billing
      - SECRET_KEY=friends_network_super_secret_production_key_2026_987654321
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/backend/static/uploads
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fn_nextjs_frontend
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    container_name: fn_nginx_gateway
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
  uploads_data:
